<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLOR HUNTER</title>

    <!-- CSS LINK -->
    <link rel="stylesheet" href="./style.css">

    <!-- GOOGLE ICONS LINK -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>

    <!-- MODE BUTTON -->
    <button id="mode">
        <span class="material-symbols-outlined" id="modeTxt">light_mode</span>
    </button>

    <!-- THE DISPLAY -->
    <div class="start" id="start">
        <h1 id="text">color hunter</h1>
        <p id="score"></p>
        <p id="highScore"></p>
        <button onclick="start()" id="btn">find the color</button>
    </div>

    <!-- MAIN CON -->
    <div class="data" id="main-con"></div>
    
    <!-- COUNTER -->
    <div class="counter" id="countCon">
        <p id="counter"></p>
    </div>

    <!-- JS LINK -->
    <script src="./script.js"></script>
</body>
</html>
